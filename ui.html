<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Pipeline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #f8fafc;
    }

    .subtitle {
      color: #64748b;
      font-size: 0.9rem;
      margin-bottom: 40px;
    }

    .search-box {
      width: 100%;
      max-width: 720px;
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
    }

    input[type="text"] {
      flex: 1;
      padding: 14px 18px;
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #6366f1;
    }

    button {
      padding: 14px 24px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    button:hover { background: #4f46e5; }
    button:disabled { background: #374151; cursor: not-allowed; }

    .status {
      color: #64748b;
      font-size: 0.85rem;
      margin-bottom: 24px;
      min-height: 20px;
    }

    .answer-box {
      width: 100%;
      max-width: 720px;
      display: none;
    }

    .answer-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6366f1;
      margin-bottom: 10px;
    }

    .answer-text {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 20px 24px;
      font-size: 1rem;
      line-height: 1.7;
      color: #e2e8f0;
      white-space: pre-wrap;
      margin-bottom: 24px;
    }

    .sources-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 10px;
    }

    .source {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .source-file {
      font-size: 0.82rem;
      color: #94a3b8;
      word-break: break-all;
    }

    .source-score {
      font-size: 0.8rem;
      font-weight: 600;
      color: #6366f1;
      white-space: nowrap;
    }

    .source-preview {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 6px;
      line-height: 1.5;
    }

    .error {
      color: #f87171;
      background: #1e1010;
      border: 1px solid #7f1d1d;
      border-radius: 10px;
      padding: 16px 20px;
      width: 100%;
      max-width: 720px;
      font-size: 0.9rem;
    }

    .elapsed {
      font-size: 0.78rem;
      color: #475569;
      margin-top: 12px;
      text-align: right;
    }
  </style>
</head>
<body>

  <h1>RAG Pipeline</h1>
  <p class="subtitle">Ask a question. Get an answer from your documents.</p>

  <div class="search-box">
    <input type="text" id="question" placeholder="What is the bond system?" autofocus />
    <button id="askBtn" onclick="ask()">Ask</button>
  </div>

  <div class="status" id="status"></div>
  <div class="error" id="error" style="display:none"></div>
  <div class="answer-box" id="answerBox">
    <div class="answer-label">Answer</div>
    <div class="answer-text" id="answerText"></div>
    <div class="elapsed" id="elapsed"></div>
    <div class="sources-label">Sources</div>
    <div id="sources"></div>
  </div>

  <script>
    const API = "http://localhost:8000";

    document.getElementById("question").addEventListener("keydown", e => {
      if (e.key === "Enter") ask();
    });

    async function ask() {
      const q = document.getElementById("question").value.trim();
      if (!q) return;

      const btn = document.getElementById("askBtn");
      const status = document.getElementById("status");
      const errorBox = document.getElementById("error");
      const answerBox = document.getElementById("answerBox");

      btn.disabled = true;
      status.textContent = "Searching documents...";
      errorBox.style.display = "none";
      answerBox.style.display = "none";

      try {
        const res = await fetch(`${API}/query`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: q, top_k: 5 }),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || `HTTP ${res.status}`);
        }

        const data = await res.json();

        document.getElementById("answerText").textContent = data.answer;
        document.getElementById("elapsed").textContent = `Generated in ${(data.elapsed_ms / 1000).toFixed(1)}s`;

        const sourcesEl = document.getElementById("sources");
        sourcesEl.innerHTML = "";
        for (const s of data.sources) {
          const filename = s.source.split(/[\\/]/).pop();
          const div = document.createElement("div");
          div.className = "source";
          div.innerHTML = `
            <div>
              <div class="source-file">${filename} &nbsp;·&nbsp; chunk ${s.chunk_index}</div>
              <div class="source-preview">${s.text.slice(0, 120).replace(/</g, "&lt;")}...</div>
            </div>
            <div class="source-score">${(s.score * 100).toFixed(0)}%</div>
          `;
          sourcesEl.appendChild(div);
        }

        answerBox.style.display = "block";
        status.textContent = "";
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = "block";
        status.textContent = "";
      } finally {
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>
